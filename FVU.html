<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>متجر العطّار</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #1A1D23;
  --surface:  #22262F;
  --surface2: #2A2F3A;
  --border:   #333845;
  --text:     #E8EAF0;
  --sub:      #8B90A0;
  --accent:   #E8A838;
  --accent2:  #F5C96A;
  --green:    #3EC87A;
  --green-dim:#1E6640;
  --red:      #E05C5C;
  --red-dim:  #5C2020;
  --warn:     #E8A838;
  --warn-dim: #5C3D10;
  --shadow:   rgba(0,0,0,0.35);
}


html, body { height:100%; font-family:‘Cairo’,sans-serif; background:var(–bg); color:var(–text); overflow-x:hidden; }

/* HEADER */
header {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 14px 20px;
display: flex;
align-items: center;
justify-content: space-between;
position: sticky;
top: 0;
z-index: 100;
}
.logo { display:flex; align-items:center; gap:12px; }
.logo-icon {
width:42px; height:42px;
background: linear-gradient(135deg,#5C3D10,var(–accent));
border-radius:12px;
display:flex; align-items:center; justify-content:center;
font-size:20px;
}
.logo h1 { font-family:‘Amiri’,serif; font-size:22px; color:var(–text); line-height:1.1; }
.logo p  { font-size:10px; color:var(–sub); letter-spacing:1px; }
.hdr-stats { display:flex; gap:10px; }
.hdr-stat { text-align:center; background:var(–surface2); border-radius:10px; padding:6px 12px; border:1px solid var(–border); }
.hdr-stat .n { font-size:16px; font-weight:800; color:var(–accent); display:block; line-height:1; }
.hdr-stat .l { font-size:9px; color:var(–sub); }

/* BOTTOM NAV */
.bottom-nav {
position:fixed; bottom:0; left:0; right:0;
background:var(–surface);
border-top:1px solid var(–border);
display:flex;
z-index:100;
padding-bottom:env(safe-area-inset-bottom);
}
.nav-btn {
flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
padding:10px 0 8px; border:none; background:transparent; color:var(–sub);
font-family:‘Cairo’,sans-serif; font-size:11px; font-weight:600;
cursor:pointer; gap:4px; transition:color 0.2s; position:relative;
}
.nav-btn .ni { font-size:22px; line-height:1; }
.nav-btn.active { color:var(–accent); }
.nav-btn.active::before {
content:’’; position:absolute; top:0; left:20%; right:20%;
height:2px; background:var(–accent); border-radius:0 0 4px 4px;
}

/* MAIN */
main { padding:16px 16px 90px; max-width:960px; margin:0 auto; }
.panel { display:none; }
.panel.active { display:block; }

/* SECTION LABEL */
.sl {
font-size:11px; font-weight:700; letter-spacing:2px; color:var(–sub);
text-transform:uppercase; margin-bottom:12px; margin-top:22px;
display:flex; align-items:center; gap:8px;
}
.sl:first-child { margin-top:4px; }
.sl::after { content:’’; flex:1; height:1px; background:var(–border); }

/* CARD */
.card {
background:var(–surface);
border:1px solid var(–border);
border-radius:16px;
padding:20px;
margin-bottom:14px;
}

/* FORM */
.form-col { display:flex; flex-direction:column; gap:12px; }
.field label { display:block; font-size:12px; font-weight:600; color:var(–sub); margin-bottom:6px; letter-spacing:.5px; }
.field input {
width:100%; background:var(–surface2); border:1.5px solid var(–border);
border-radius:12px; padding:13px 16px; font-family:‘Cairo’,sans-serif;
font-size:15px; color:var(–text); outline:none; transition:border-color .2s, box-shadow .2s;
}
.field input::placeholder { color:var(–sub); opacity:.6; }
.field input:focus { border-color:var(–accent); box-shadow:0 0 0 3px rgba(232,168,56,.12); }
.field input[type=number] { direction:ltr; text-align:right; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

/* BUTTONS */
.btn {
border:none; border-radius:12px; font-family:‘Cairo’,sans-serif; font-weight:700;
cursor:pointer; transition:opacity .15s,transform .12s;
display:inline-flex; align-items:center; justify-content:center; gap:6px;
}
.btn:active { transform:scale(.97); }
.btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.btn-accent {
background:linear-gradient(135deg,var(–accent) 0%,var(–accent2) 100%);
color:#1A1200; padding:14px 20px; font-size:15px; width:100%;
box-shadow:0 4px 16px rgba(232,168,56,.3);
}
.btn-green {
background:var(–green); color:#0A2618;
padding:14px 20px; font-size:15px; width:100%;
box-shadow:0 4px 16px rgba(62,200,122,.25);
}
.btn-red { background:var(–red-dim); color:var(–red); border:1px solid rgba(224,92,92,.25); padding:8px 14px; font-size:13px; }

/* SEARCH */
.sw { position:relative; margin-bottom:14px; }
.sw input {
width:100%; background:var(–surface2); border:1.5px solid var(–border);
border-radius:12px; padding:12px 16px 12px 40px; font-family:‘Cairo’,sans-serif;
font-size:14px; color:var(–text); outline:none; transition:border-color .2s; direction:rtl;
}
.sw input:focus { border-color:var(–accent); }
.sw::before { content:‘🔍’; position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }

/* INV LIST */
.inv-item {
background:var(–surface); border:1px solid var(–border); border-radius:14px;
padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px;
transition:border-color .2s;
}
.inv-item:hover { border-color:var(–accent); }
.inv-emoji { width:44px; height:44px; background:var(–surface2); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.inv-info { flex:1; min-width:0; }
.inv-name { font-size:15px; font-weight:700; color:var(–text); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.inv-meta { display:flex; gap:8px; flex-wrap:wrap; }
.chip { font-size:11px; color:var(–sub); background:var(–surface2); padding:2px 8px; border-radius:6px; }
.chip.a { color:var(–accent); }
.chip.g { color:var(–green); }
.inv-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
.badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
.badge-ok  { background:var(–green-dim); color:var(–green); }
.badge-low { background:var(–warn-dim);  color:var(–warn); }
.badge-out { background:var(–red-dim);   color:var(–red); }

/* SALE GRID */
.sale-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.sale-card {
background:var(–surface); border:1.5px solid var(–border); border-radius:14px;
padding:14px 12px; cursor:pointer; transition:border-color .2s,transform .15s,box-shadow .15s;
text-align:center; overflow:hidden;
}
.sale-card:active { transform:scale(.96); }
.sale-card:not(.out):hover { border-color:var(–accent); box-shadow:0 4px 20px rgba(232,168,56,.15); }
.sale-card.out { opacity:.4; cursor:not-allowed; }
.sc-icon { font-size:28px; }
.sc-name { font-size:14px; font-weight:700; color:var(–text); margin:6px 0 4px; }
.sc-stock { font-size:11px; color:var(–sub); margin-bottom:6px; }
.sc-price { font-size:13px; font-weight:700; color:var(–accent); }

/* CART */
.cart-item { display:flex; align-items:center; gap:10px; padding:12px 0; border-bottom:1px solid var(–border); }
.cart-item:last-child { border-bottom:none; }
.cart-name { flex:1; font-size:14px; font-weight:600; color:var(–text); line-height:1.3; }
.cart-sub { font-size:11px; color:var(–sub); font-weight:400; }
.qc { display:flex; align-items:center; gap:6px; background:var(–surface2); border-radius:10px; padding:4px 6px; }
.qc button { width:28px; height:28px; border:none; background:var(–border); border-radius:7px; color:var(–text); font-size:16px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; }
.qc button:hover { background:var(–accent); color:#1A1200; }
.qc span { font-size:13px; font-weight:700; min-width:24px; text-align:center; color:var(–text); }
.cart-price { font-size:13px; font-weight:800; color:var(–green); min-width:50px; text-align:left; }
.rm-btn { background:none; border:none; color:var(–sub); font-size:18px; cursor:pointer; line-height:1; padding:2px; transition:color .15s; }
.rm-btn:hover { color:var(–red); }
.cart-empty { text-align:center; padding:30px 0; color:var(–sub); font-size:14px; line-height:2; }
.total-bar { background:var(–surface2); border:1px solid var(–border); border-radius:14px; padding:14px 16px; margin:14px 0; display:flex; justify-content:space-between; align-items:center; }
.total-bar .tl { font-size:14px; color:var(–sub); }
.total-bar .tv { font-size:22px; font-weight:900; color:var(–accent); }

/* HISTORY */
.hist-card { background:var(–surface); border:1px solid var(–border); border-radius:14px; padding:16px; margin-bottom:10px; border-right:3px solid var(–accent); }
.hist-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
.hist-date { font-size:11px; color:var(–sub); margin-bottom:3px; }
.hist-cnt { font-size:13px; font-weight:600; color:var(–text); }
.hist-total { font-size:20px; font-weight:900; color:var(–green); }
.hist-items { font-size:12px; color:var(–sub); line-height:1.8; }

/* MODAL SHEET */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; align-items:flex-end; justify-content:center; backdrop-filter:blur(4px); }
.overlay.open { display:flex; }
.sheet { background:var(–surface); border-radius:24px 24px 0 0; padding:24px 20px 32px; width:100%; max-width:480px; animation:slideUp .28s cubic-bezier(.34,1.4,.64,1); border-top:1px solid var(–border); }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
.sh-handle { width:40px; height:4px; background:var(–border); border-radius:2px; margin:0 auto 20px; }
.sheet h3 { font-family:‘Amiri’,serif; font-size:20px; color:var(–text); margin-bottom:6px; }
.sheet-sub { font-size:13px; color:var(–sub); margin-bottom:20px; }
.unit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.unit-radio { display:none; }
.unit-tile { display:block; background:var(–surface2); border:2px solid var(–border); border-radius:14px; padding:14px 10px; text-align:center; cursor:pointer; transition:border-color .2s,background .2s; }
.unit-tile .utk { font-size:20px; font-weight:900; color:var(–text); display:block; margin-bottom:4px; }
.unit-tile .utp { font-size:13px; font-weight:700; color:var(–accent); }
.unit-radio:checked + .unit-tile { border-color:var(–accent); background:rgba(232,168,56,.1); }
.unit-tile.dis { opacity:.35; cursor:not-allowed; }

/* TOAST */
.toast {
position:fixed; bottom:80px; left:50%;
transform:translateX(-50%) translateY(20px);
background:var(–surface2); color:var(–text); border:1px solid var(–border);
padding:11px 24px; border-radius:30px; font-size:13px; font-weight:600;
z-index:999; opacity:0; transition:opacity .25s,transform .25s;
pointer-events:none; white-space:nowrap; box-shadow:0 8px 24px var(–shadow);
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* DESKTOP */
@media (min-width:760px) {
.bottom-nav { display:none; }
.dtabs { display:flex; gap:4px; background:var(–surface); border-bottom:1px solid var(–border); padding:0 24px; }
.dtab {
padding:14px 22px; border:none; background:transparent; color:var(–sub);
font-family:‘Cairo’,sans-serif; font-size:14px; font-weight:600; cursor:pointer;
position:relative; transition:color .2s; display:flex; align-items:center; gap:7px;
}
.dtab.active { color:var(–accent); }
.dtab.active::after { content:’’; position:absolute; bottom:0; left:0; right:0; height:2px; background:var(–accent); }
.dtab:hover:not(.active) { color:var(–text); }
main { padding:24px 24px 40px; }
.form-col.drow { flex-direction:row; align-items:flex-end; }
.form-col.drow .field { flex:1; }
.form-col.drow .btn-accent { width:auto; padding:13px 24px; white-space:nowrap; }
.sale-layout { display:grid; grid-template-columns:1.1fr 1fr; gap:20px; align-items:start; }
.cart-sticky { position:sticky; top:80px; }
.sale-grid { grid-template-columns:repeat(3,1fr); }
.hdr-stats { display:flex; }
}
@media (max-width:759px) {
.dtabs { display:none; }
.hdr-stats { display:none; }
}

.empty-state { text-align:center; padding:50px 20px; color:var(–sub); }
.empty-state .ei { font-size:50px; margin-bottom:12px; }
.empty-state p { font-size:15px; }
</style>

</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <h1>متجر العطّار</h1>
      <p>إدارة المخزون والمبيعات</p>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat"><span class="n" id="hdr-p">0</span><span class="l">صنف</span></div>
    <div class="hdr-stat"><span class="n" id="hdr-s">0</span><span class="l">فاتورة</span></div>
    <div class="hdr-stat"><span class="n" id="hdr-r">0</span><span class="l">إجمالي ج</span></div>
  </div>
</header>

<div class="dtabs">
  <button class="dtab active" onclick="sw('inventory',this)">📦 المخزون</button>
  <button class="dtab" onclick="sw('sale',this)">🛒 البيع</button>
  <button class="dtab" onclick="sw('history',this)">📋 السجل</button>
</div>

<main>

  <!-- INVENTORY -->

  <div class="panel active" id="panel-inventory">
    <div class="sl">إضافة صنف جديد</div>
    <div class="card">
      <div class="form-col drow">
        <div class="field">
          <label>اسم الصنف</label>
          <input type="text" id="new-name" placeholder="مثال: كمون، شمر، حبة بركة" />
        </div>
        <div class="two-col">
          <div class="field">
            <label>الكمية (كجم)</label>
            <input type="number" id="new-qty" placeholder="10" min="0.25" step="0.25" />
          </div>
          <div class="field">
            <label>سعر الكيلو (ج)</label>
            <input type="number" id="new-price" placeholder="50" min="0" step="0.5" />
          </div>
        </div>
        <button class="btn btn-accent" onclick="addProduct()">➕ إضافة</button>
      </div>
    </div>
    <div class="sl">الأصناف المتاحة</div>
    <div class="sw"><input type="text" id="inv-search" placeholder="ابحث عن صنف..." oninput="renderInventory()" /></div>
    <div id="inv-list"></div>
  </div>

  <!-- SALE -->

  <div class="panel" id="panel-sale">
    <div class="sale-layout">
      <div>
        <div class="sl">اختر صنف</div>
        <div class="sw"><input type="text" id="sale-search" placeholder="بحث..." oninput="renderSaleGrid()" /></div>
        <div class="sale-grid" id="sale-grid"></div>
      </div>
      <div class="cart-sticky">
        <div class="sl" style="display:flex;justify-content:space-between;align-items:center">
          <span>الفاتورة</span>
          <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="clearCart()">مسح</button>
        </div>
        <div class="card" style="padding:16px">
          <div id="cart-body"><div class="cart-empty">🛒<br>السلة فارغة<br>اختر صنف من القائمة</div></div>
          <div class="total-bar" id="total-bar" style="display:none">
            <span class="tl">الإجمالي</span>
            <span class="tv" id="cart-grand">0 ج</span>
          </div>
          <button class="btn btn-green" id="complete-btn" onclick="completeSale()" disabled>✅ إتمام البيع</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->

  <div class="panel" id="panel-history">
    <div class="sl" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <span>سجل المبيعات</span>
      <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="clearHistory()">🗑 مسح</button>
    </div>
    <div id="history-list"></div>
  </div>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="sw('inventory',this)"><span class="ni">📦</span>المخزون</button>
  <button class="nav-btn" onclick="sw('sale',this)"><span class="ni">🛒</span>بيع</button>
  <button class="nav-btn" onclick="sw('history',this)"><span class="ni">📋</span>السجل</button>
</nav>

<!-- UNIT SHEET -->

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sh-handle"></div>
    <h3 id="sh-title">اختر الكمية</h3>
    <p class="sheet-sub" id="sh-sub"></p>
    <div class="unit-grid" id="unit-grid"></div>
    <button class="btn btn-accent" onclick="addToCart()">➕ إضافة للفاتورة</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let products = [], cart = [], salesHistory = [];
let cPid = null, selUnit = null;

function save() {
  localStorage.setItem('attar_p', JSON.stringify(products));
  localStorage.setItem('attar_h', JSON.stringify(salesHistory));
}
function load() {
  try { products     = JSON.parse(localStorage.getItem('attar_p')) || []; } catch(e){ products=[]; }
  try { salesHistory = JSON.parse(localStorage.getItem('attar_h')) || []; } catch(e){ salesHistory=[]; }
}

function sw(tab, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn,.dtab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn,.dtab').forEach(b=>{ if(b.getAttribute('onclick')?.includes("'"+tab+"'")) b.classList.add('active'); });
  if(tab==='sale') renderSaleGrid();
  if(tab==='history') renderHistory();
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

const HERBS=['🌿','🌱','🍃','🫚','🧄','🌾','🫘','🍂','🌰','🫛'];
function herb(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))&0xFFFF; return HERBS[h%HERBS.length]; }

function addProduct() {
  const name=document.getElementById('new-name').value.trim();
  const qty=parseFloat(document.getElementById('new-qty').value);
  const price=parseFloat(document.getElementById('new-price').value);
  if(!name) return toast('⚠️ أدخل اسم الصنف');
  if(!qty||qty<=0) return toast('⚠️ أدخل الكمية');
  if(!price||price<=0) return toast('⚠️ أدخل السعر');
  products.push({id:Date.now(),name,qty:Math.round(qty*4)/4,price});
  save(); renderInventory(); updateHeader();
  document.getElementById('new-name').value='';
  document.getElementById('new-qty').value='';
  document.getElementById('new-price').value='';
  toast('✅ تم إضافة '+name);
}

function delProd(id) {
  if(!confirm('حذف هذا الصنف؟')) return;
  products=products.filter(p=>p.id!==id);
  save(); renderInventory(); updateHeader(); toast('🗑 تم الحذف');
}

function badgeHtml(qty) {
  if(qty<=0) return `<span class="badge badge-out">نفد</span>`;
  if(qty<1)  return `<span class="badge badge-low">منخفض</span>`;
  return             `<span class="badge badge-ok">متوفر</span>`;
}

function renderInventory() {
  const q=document.getElementById('inv-search').value.toLowerCase();
  const el=document.getElementById('inv-list');
  const f=products.filter(p=>p.name.includes(q)||p.name.toLowerCase().includes(q));
  if(!f.length){ el.innerHTML=`<div class="empty-state"><div class="ei">📦</div><p>${q?'لا نتائج':'لا توجد أصناف بعد'}</p></div>`; return; }
  el.innerHTML=f.map(p=>`
    <div class="inv-item">
      <div class="inv-emoji">${herb(p.name)}</div>
      <div class="inv-info">
        <div class="inv-name">${p.name}</div>
        <div class="inv-meta">
          <span class="chip">📦 ${p.qty} كجم</span>
          <span class="chip a">🏷️ ${p.price} ج/كجم</span>
          <span class="chip g">¼ = ${(p.price/4).toFixed(1)} ج</span>
          <span class="chip g">½ = ${(p.price/2).toFixed(1)} ج</span>
        </div>
      </div>
      <div class="inv-right">
        ${badgeHtml(p.qty)}
        <button class="btn btn-red" onclick="delProd(${p.id})" style="font-size:11px;padding:5px 10px">🗑</button>
      </div>
    </div>`).join('');
}

function renderSaleGrid() {
  const q=document.getElementById('sale-search').value.toLowerCase();
  const g=document.getElementById('sale-grid');
  const f=products.filter(p=>p.name.includes(q)||p.name.toLowerCase().includes(q));
  if(!f.length){ g.innerHTML=`<div style="grid-column:span 2;text-align:center;padding:30px;color:var(--sub)">لا توجد أصناف</div>`; return; }
  g.innerHTML=f.map(p=>{
    const out=p.qty<=0;
    return `<div class="sale-card ${out?'out':''}" onclick="${out?'':` openSheet(${p.id})`}">
      <div class="sc-icon">${herb(p.name)}</div>
      <div class="sc-name">${p.name}</div>
      <div class="sc-stock">${p.qty} كجم</div>
      <div class="sc-price">${p.price} ج/كجم</div>
    </div>`;
  }).join('');
}

function openSheet(id) {
  const p=products.find(x=>x.id===id); if(!p) return;
  cPid=id; selUnit=null;
  document.getElementById('sh-title').textContent=p.name;
  document.getElementById('sh-sub').textContent=`المتاح: ${p.qty} كجم · سعر الكيلو: ${p.price} ج`;
  const units=[{l:'¼ كجم',k:.25},{l:'½ كجم',k:.5},{l:'¾ كجم',k:.75},{l:'1 كجم',k:1}];
  document.getElementById('unit-grid').innerHTML=units.map((u,i)=>{
    const av=p.qty>=u.k;
    return `<div>
      <input type="radio" class="unit-radio" name="usel" id="u${i}" value="${u.k}" ${!av?'disabled':''} onchange="selUnit=${u.k}">
      <label for="u${i}" class="unit-tile ${!av?'dis':''}">
        <span class="utk">${u.l}</span>
        <span class="utp">${(p.price*u.k).toFixed(2)} ج</span>
        ${!av?'<span style="font-size:10px;color:var(--red);display:block;margin-top:3px">غير متاح</span>':''}
      </label>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closeSheet(); });
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); cPid=null; selUnit=null; }

function addToCart() {
  if(!selUnit) return toast('⚠️ اختر الكمية أولاً');
  const p=products.find(x=>x.id===cPid); if(!p) return;
  const ex=cart.find(c=>c.id===p.id&&c.unit===selUnit);
  if(ex){ if(ex.qty*selUnit+selUnit>p.qty) return toast('⚠️ مخزون غير كافٍ'); ex.qty++; }
  else   cart.push({id:p.id,name:p.name,unit:selUnit,qty:1,ppk:p.price});
  renderCart(); closeSheet();
  const kl=selUnit===.25?'¼':selUnit===.5?'½':selUnit===.75?'¾':'1';
  toast(`✅ ${p.name} (${kl} كجم)`);
}

function renderCart() {
  const body=document.getElementById('cart-body');
  const bar=document.getElementById('total-bar');
  const btn=document.getElementById('complete-btn');
  if(!cart.length){ body.innerHTML=`<div class="cart-empty">🛒<br>السلة فارغة<br>اختر صنف من القائمة</div>`; bar.style.display='none'; btn.disabled=true; return; }
  let grand=0;
  body.innerHTML=cart.map((item,i)=>{
    const lt=item.qty*item.unit*item.ppk; grand+=lt;
    const kl=item.unit===.25?'¼':item.unit===.5?'½':item.unit===.75?'¾':'1';
    return `<div class="cart-item">
      <div class="cart-name">${item.name}<br><span class="cart-sub">${kl} كجم × ${item.qty}</span></div>
      <div class="qc">
        <button onclick="chQty(${i},-1)">−</button>
        <span>${item.qty}</span>
        <button onclick="chQty(${i},1)">+</button>
      </div>
      <div class="cart-price">${lt.toFixed(1)}ج</div>
      <button class="rm-btn" onclick="rmCart(${i})">✕</button>
    </div>`;
  }).join('');
  document.getElementById('cart-grand').textContent=grand.toFixed(2)+' ج';
  bar.style.display='flex'; btn.disabled=false;
}

function chQty(i,d) {
  const item=cart[i]; const p=products.find(x=>x.id===item.id); if(!p) return;
  const nq=item.qty+d;
  if(nq<=0) cart.splice(i,1);
  else if(nq*item.unit>p.qty){ toast('⚠️ مخزون غير كافٍ'); return; }
  else item.qty=nq;
  renderCart();
}
function rmCart(i){ cart.splice(i,1); renderCart(); }
function clearCart(){ if(!cart.length||!confirm('مسح الفاتورة؟')) return; cart=[]; renderCart(); }

function completeSale() {
  if(!cart.length) return;
  for(const item of cart){ const p=products.find(x=>x.id===item.id); if(!p||p.qty<item.qty*item.unit) return toast(`⚠️ مخزون "${item.name}" غير كافٍ`); }
  let total=0; const si=[];
  for(const item of cart){
    const p=products.find(x=>x.id===item.id);
    p.qty=Math.round((p.qty-item.qty*item.unit)*4)/4;
    const lt=item.qty*item.unit*item.ppk; total+=lt;
    const kl=item.unit===.25?'¼':item.unit===.5?'½':item.unit===.75?'¾':'1';
    si.push(`${item.name} (${item.qty}×${kl}) — ${lt.toFixed(2)} ج`);
  }
  salesHistory.unshift({id:Date.now(),date:new Date().toLocaleString('ar-EG'),items:si,total:total.toFixed(2)});
  save(); cart=[]; renderCart(); renderSaleGrid(); updateHeader();
  toast(`✅ تم البيع! الإجمالي: ${total.toFixed(2)} ج`);
}

function renderHistory() {
  const c=document.getElementById('history-list');
  if(!salesHistory.length){ c.innerHTML=`<div class="empty-state"><div class="ei">📋</div><p>لا توجد مبيعات بعد</p></div>`; return; }
  c.innerHTML=salesHistory.map(s=>`
    <div class="hist-card">
      <div class="hist-top">
        <div><div class="hist-date">🕐 ${s.date}</div><div class="hist-cnt">${s.items.length} صنف</div></div>
        <div class="hist-total">${s.total} ج</div>
      </div>
      <div class="hist-items">${s.items.join('<br>')}</div>
    </div>`).join('');
}

function clearHistory(){ if(!confirm('حذف كل السجل؟')) return; salesHistory=[]; save(); renderHistory(); updateHeader(); toast('🗑 تم مسح السجل'); }

function updateHeader() {
  document.getElementById('hdr-p').textContent=products.length;
  document.getElementById('hdr-s').textContent=salesHistory.length;
  document.getElementById('hdr-r').textContent=salesHistory.reduce((s,h)=>s+parseFloat(h.total),0).toFixed(0);
}

load(); renderInventory(); updateHeader();
</script>

</body>
</html>
