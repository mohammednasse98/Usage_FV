<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام توزيع الخبز</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --card: #1e2330;
    --border: #2a3045;
    --gold: #f5c842;
    --gold2: #e8a820;
    --red: #e05555;
    --green: #4cbb8a;
    --blue: #4a90d9;
    --text: #e8eaf0;
    --muted: #7a8099;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 80% 50% at 20% -10%, rgba(245,200,66,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 110%, rgba(74,144,217,0.06) 0%, transparent 60%);
  }

  /* ===== LOGIN ===== */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .login-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo .icon {
    font-size: 52px;
    display: block;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(245,200,66,0.4));
  }

  .login-logo h1 {
    font-size: 22px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .login-logo p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .role-tabs {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }

  .role-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border: none;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }

  .role-tab.active {
    background: var(--gold);
    color: #0d0f14;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 16px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
    text-align: right;
  }

  input:focus { outline: none; border-color: var(--gold); }

  .btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-gold { background: var(--gold); color: #0d0f14; }
  .btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { opacity: 0.85; }

  .btn-sm {
    width: auto;
    padding: 7px 14px;
    font-size: 13px;
    margin-top: 0;
    border-radius: 8px;
  }

  .error-msg {
    background: rgba(224,85,85,0.12);
    border: 1px solid rgba(224,85,85,0.3);
    color: var(--red);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ===== APP ===== */
  #appScreen { display: none; min-height: 100vh; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 900;
    font-size: 16px;
    color: var(--gold);
  }

  .topbar-user {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .role-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .badge-admin { background: rgba(245,200,66,0.15); color: var(--gold); border: 1px solid rgba(245,200,66,0.3); }
  .badge-user { background: rgba(74,144,217,0.15); color: var(--blue); border: 1px solid rgba(74,144,217,0.3); }

  .main { padding: 24px; max-width: 960px; margin: 0 auto; }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.08;
    transform: translate(20px, -20px);
  }

  .stat-card.gold::before { background: var(--gold); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-card.red::before { background: var(--red); }

  .stat-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 900; }
  .stat-card.gold .stat-value { color: var(--gold); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.red .stat-value { color: var(--red); }

  /* ===== SEARCH ===== */
  .search-bar {
    position: relative;
    margin-bottom: 20px;
  }

  .search-bar input {
    padding-right: 44px;
    font-size: 15px;
  }

  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    pointer-events: none;
  }

  /* ===== ADD FORM (admin) ===== */
  .add-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }

  .add-form h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
  }

  .form-row label { margin-top: 0; }

  .form-row .btn { margin-top: 0; width: auto; padding: 12px 20px; }

  /* ===== TABLE ===== */
  .table-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .table-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .table-header h3 {
    font-size: 15px;
    font-weight: 700;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    padding: 12px 20px;
    text-align: right;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  td {
    padding: 14px 20px;
    font-size: 14px;
    border-bottom: 1px solid rgba(42,48,69,0.6);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: rgba(255,255,255,0.02); }

  .name-cell { font-weight: 700; font-size: 15px; }

  .num-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 13px;
  }

  .num-people { background: rgba(74,144,217,0.12); color: var(--blue); }
  .num-bread { background: rgba(245,200,66,0.12); color: var(--gold); }
  .num-money { background: rgba(76,187,138,0.12); color: var(--green); }
  .num-paid { background: rgba(76,187,138,0.12); color: var(--green); }
  .num-remaining { background: rgba(224,85,85,0.12); color: var(--red); }
  .num-zero { background: rgba(76,187,138,0.08); color: var(--green); }

  .actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ===== EDIT MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }

  .modal h3 {
    font-size: 17px;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--gold);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .modal-actions .btn { flex: 1; margin-top: 0; }

  /* ===== EMPTY ===== */
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
  }

  .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ===== LOADING ===== */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr 1fr; }
    .form-row .btn { grid-column: 1 / -1; }
    .topbar { padding: 0 16px; }
    .main { padding: 16px; }
    th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <span class="icon">🍞</span>
      <h1>نظام توزيع الخبز</h1>
      <p>سجّل دخولك للمتابعة</p>
    </div>

    <div class="role-tabs">
      <button class="role-tab active" onclick="setRole('admin')">👑 أدمن</button>
      <button class="role-tab" onclick="setRole('user')">👤 مستخدم</button>
    </div>

    <label>البريد الإلكتروني</label>
    <input type="email" id="loginEmail" placeholder="example@mail.com" dir="ltr">

    <label>كلمة المرور</label>
    <input type="password" id="loginPassword" placeholder="••••••••" dir="ltr">

    <div class="error-msg" id="loginError"></div>

    <button class="btn btn-gold" onclick="doLogin()">🔐 دخول</button>

    <div id="registerSection" style="display:none; margin-top:16px; border-top:1px solid var(--border); padding-top:16px;">
      <p style="font-size:12px; color:var(--muted); text-align:center; margin-bottom:12px;">مش عندك حساب مستخدم؟</p>
      <button class="btn btn-outline" onclick="doRegister()">✨ إنشاء حساب مستخدم جديد</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-brand">
      <span>🍞</span>
      نظام الخبز
    </div>
    <div class="topbar-user">
      <span id="userEmailDisplay" style="font-size:13px; color:var(--muted);"></span>
      <span id="roleBadge" class="role-badge badge-user"></span>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">خروج</button>
    </div>
  </div>

  <div class="main">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-label">📋 إجمالي الإدخالات</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">🧑‍🤝‍🧑 إجمالي الأشخاص</div>
        <div class="stat-value" id="statPeople">0</div>
      </div>
      <div class="stat-card gold">
        <div class="stat-label">🍞 أرغفة يومية</div>
        <div class="stat-value" id="statBread">0</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">💰 إجمالي الجنيهات</div>
        <div class="stat-value" id="statMoney">0</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">✅ إجمالي المدفوع</div>
        <div class="stat-value" id="statPaid">0</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">⏳ إجمالي الباقي</div>
        <div class="stat-value" id="statRemaining">0</div>
      </div>
    </div>

    <!-- ADD FORM (admin only) -->
    <div class="add-form" id="addFormSection" style="display:none;">
      <h3>➕ إضافة إدخال جديد</h3>
      <div class="form-row">
        <div>
          <label>الاسم</label>
          <input type="text" id="newName" placeholder="اسم الشخص أو المجموعة">
        </div>
        <div>
          <label>عدد الأشخاص</label>
          <input type="number" id="newPeople" placeholder="مثال: 4" min="1">
        </div>
        <div>
          <label>المبلغ المدفوع (ج)</label>
          <input type="number" id="newPaid" placeholder="0" min="0">
        </div>
        <button class="btn btn-gold" onclick="addEntry()">إضافة ✓</button>
      </div>
      <div class="error-msg" id="addError"></div>
    </div>

    <!-- SEARCH -->
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ابحث بالاسم..." oninput="renderTable()">
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-header">
        <h3>📊 بيانات التوزيع</h3>
        <span style="font-size:12px; color:var(--muted);" id="recordCount"></span>
      </div>
      <div id="tableContainer">
        <div class="loading">⏳ جارٍ تحميل البيانات...</div>
      </div>
    </div>

  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>✏️ تعديل الإدخال</h3>
    <input type="hidden" id="editKey">
    <label>الاسم</label>
    <input type="text" id="editName">
    <label>عدد الأشخاص</label>
    <input type="number" id="editPeople" min="1">
    <label>المبلغ المدفوع (ج)</label>
    <input type="number" id="editPaid" min="0">
    <div class="error-msg" id="editError"></div>
    <div class="modal-actions">
      <button class="btn btn-gold" onclick="saveEdit()">حفظ</button>
      <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
// ===== FIREBASE INIT =====
const firebaseConfig = {
  apiKey: "AIzaSyAxgOiXWzzQx5VlkEZklrLDpsu6Pf4jgpU",
  authDomain: "education-e65d7.firebaseapp.com",
  databaseURL: "https://education-e65d7-default-rtdb.firebaseio.com",
  projectId: "education-e65d7",
  storageBucket: "education-e65d7.firebasestorage.app",
  messagingSenderId: "1071767617322",
  appId: "1:1071767617322:web:2dcb4576ba55d31d0ba853",
  measurementId: "G-KBF76EG2K7"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ADMIN EMAIL - غير الإيميل ده لإيميل الأدمن بتاعك
const ADMIN_EMAIL = "admin@bread.com";

let currentRole = 'admin';
let allData = {};

// ===== ROLE TABS =====
function setRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('registerSection').style.display = role === 'user' ? 'block' : 'none';
}

// ===== AUTH =====
function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) return showError('loginError', '⚠️ اكتب الإيميل وكلمة المرور');
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    showError('loginError', '❌ ' + translateError(e.code));
  }
}

async function doRegister() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email || !pass) return showError('loginError', '⚠️ اكتب الإيميل وكلمة المرور');
  if (pass.length < 6) return showError('loginError', '⚠️ كلمة المرور 6 أحرف على الأقل');
  try {
    await auth.createUserWithEmailAndPassword(email, pass);
  } catch (e) {
    showError('loginError', '❌ ' + translateError(e.code));
  }
}

async function doLogout() {
  await auth.signOut();
}

function translateError(code) {
  const map = {
    'auth/user-not-found': 'مفيش حساب بالإيميل ده',
    'auth/wrong-password': 'كلمة المرور غلط',
    'auth/invalid-email': 'الإيميل غلط',
    'auth/email-already-in-use': 'الإيميل ده متسجل قبل كده',
    'auth/weak-password': 'كلمة المرور ضعيفة',
    'auth/invalid-credential': 'الإيميل أو كلمة المرور غلط',
  };
  return map[code] || code;
}

// ===== AUTH STATE =====
auth.onAuthStateChanged(user => {
  if (user) {
    const isAdmin = user.email === ADMIN_EMAIL;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('userEmailDisplay').textContent = user.email;
    document.getElementById('roleBadge').textContent = isAdmin ? '👑 أدمن' : '👤 مستخدم';
    document.getElementById('roleBadge').className = 'role-badge ' + (isAdmin ? 'badge-admin' : 'badge-user');
    document.getElementById('addFormSection').style.display = isAdmin ? 'block' : 'none';
    loadData(isAdmin);
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }
});

// ===== REALTIME DATA =====
function loadData(isAdmin) {
  db.ref('entries').on('value', snap => {
    allData = snap.val() || {};
    updateStats();
    renderTable(isAdmin);
  });
}

function updateStats() {
  const entries = Object.values(allData);
  const totalPeople = entries.reduce((s, e) => s + (e.people || 0), 0);
  const totalPaid = entries.reduce((s, e) => s + (e.paid || 0), 0);
  const totalMoney = totalPeople;
  const totalRemaining = totalMoney - totalPaid;
  document.getElementById('statTotal').textContent = entries.length;
  document.getElementById('statPeople').textContent = totalPeople;
  document.getElementById('statBread').textContent = totalPeople * 5;
  document.getElementById('statMoney').textContent = totalMoney + ' ج';
  document.getElementById('statPaid').textContent = totalPaid + ' ج';
  document.getElementById('statRemaining').textContent = totalRemaining + ' ج';
}

function renderTable(isAdmin) {
  if (isAdmin === undefined) isAdmin = auth.currentUser?.email === ADMIN_EMAIL;
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const entries = Object.entries(allData).filter(([k, v]) =>
    !search || v.name?.toLowerCase().includes(search) || v.name?.includes(search)
  );

  document.getElementById('recordCount').textContent = entries.length + ' سجل';

  if (entries.length === 0) {
    document.getElementById('tableContainer').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <p>${search ? 'مفيش نتائج للبحث ده' : 'مفيش بيانات لحد دلوقتي'}</p>
      </div>`;
    return;
  }

  const rows = entries.map(([key, e]) => {
    const bread = (e.people || 0) * 5;
    const money = e.people || 0;
    const paid = e.paid || 0;
    const remaining = money - paid;
    const remClass = remaining <= 0 ? 'num-zero' : 'num-remaining';
    const remLabel = remaining <= 0 ? '✅ مسدد' : `⏳ ${remaining} ج`;
    const adminActions = isAdmin ? `
      <div class="actions">
        <button class="btn btn-outline btn-sm" onclick="openEdit('${key}', '${e.name}', ${e.people}, ${paid})">✏️ تعديل</button>
        <button class="btn btn-danger btn-sm" onclick="deleteEntry('${key}')">🗑️</button>
      </div>` : '';
    return `
      <tr>
        <td class="name-cell">${e.name}</td>
        <td><span class="num-badge num-people">👥 ${e.people}</span></td>
        <td><span class="num-badge num-bread">🍞 ${bread}</span></td>
        <td><span class="num-badge num-money">💰 ${money} ج</span></td>
        
        ${isAdmin ? `<td>${adminActions}</td>` : ''}
      </tr>`;
  }).join('');

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>الاسم</th>
          <th>الأشخاص</th>
          <th>أرغفة يومية</th>
          <th>المطلوب</th>
          ${isAdmin ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ===== ADMIN ACTIONS =====
async function addEntry() {
  const name = document.getElementById('newName').value.trim();
  const people = parseInt(document.getElementById('newPeople').value);
  const paid = parseFloat(document.getElementById('newPaid').value) || 0;

  if (!name) return showError('addError', '⚠️ اكتب الاسم');
  if (!people || people < 1) return showError('addError', '⚠️ اكتب عدد صحيح للأشخاص');

  // Check duplicate name
  const existing = Object.values(allData).find(e => e.name.toLowerCase() === name.toLowerCase());
  if (existing) return showError('addError', '❌ الاسم ده موجود قبل كده');

  await db.ref('entries').push({ name, people, paid });
  document.getElementById('newName').value = '';
  document.getElementById('newPeople').value = '';
  document.getElementById('newPaid').value = '';
}

async function deleteEntry(key) {
  if (!confirm('متأكد إنك عايز تمسح الإدخال ده؟')) return;
  await db.ref('entries/' + key).remove();
}

function openEdit(key, name, people, paid) {
  document.getElementById('editKey').value = key;
  document.getElementById('editName').value = name;
  document.getElementById('editPeople').value = people;
  document.getElementById('editPaid').value = paid || 0;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('open');
}

async function saveEdit() {
  const key = document.getElementById('editKey').value;
  const name = document.getElementById('editName').value.trim();
  const people = parseInt(document.getElementById('editPeople').value);
  const paid = parseFloat(document.getElementById('editPaid').value) || 0;

  if (!name) return showError('editError', '⚠️ اكتب الاسم');
  if (!people || people < 1) return showError('editError', '⚠️ اكتب عدد صحيح');

  // Check duplicate (excluding current)
  const dup = Object.entries(allData).find(([k, e]) => k !== key && e.name.toLowerCase() === name.toLowerCase());
  if (dup) return showError('editError', '❌ الاسم ده موجود قبل كده');

  await db.ref('entries/' + key).update({ name, people, paid });
  closeModal();
}
</script>
