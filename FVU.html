<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>متجر العطّار</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  transition: all 0.2s ease;
}

/* 🎨 COLORS */
:root {
--bg: #0F1115;
--surface: #181C23;
--surface2: #1F2430;
--border: #2A2F3A;

--text: #F5F7FA;
--sub: #9AA3B2;

--accent: #D4AF37;
--accent2: #F0D67A;

--green: #22C55E;
--green-dim: #123D2A;

--red: #EF4444;
--red-dim: #3F1D1D;

--warn: #F59E0B;
--warn-dim: #3D2A12;

--shadow: rgba(0,0,0,0.5);
}

/* BASE */
html, body {
  height:100%;
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
}

.logo-icon {
  width:42px;
  height:42px;
  background: linear-gradient(135deg,#5C3D10,var(--accent));
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.logo h1 {
  font-family:'Amiri', serif;
  font-size:20px;
}

/* CARD */
.card {
  background: rgba(24, 28, 35, 0.85);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.25);
}

/* INPUT */
.field input {
  width:100%;
  background: var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  color:var(--text);
}

.field input:focus {
  border-color: var(--accent);
  box-shadow:0 0 0 2px rgba(212,175,55,0.2);
}

/* BUTTON */
.btn {
  border:none;
  border-radius:14px;
  cursor:pointer;
}

.btn-accent {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#1a1200;
  padding:14px;
  font-weight:bold;
  box-shadow: 0 6px 20px rgba(212,175,55,0.35);
}

.btn-accent:hover {
  transform: translateY(-2px);
}

.btn-green {
  background: var(--green);
  color:#052e1a;
}

.btn-red {
  background: var(--red-dim);
  color: var(--red);
}

/* SALE CARDS */
.sale-card {
  background: linear-gradient(145deg, #1c212b, #161a22);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  text-align:center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.sale-card:hover {
  transform: translateY(-5px) scale(1.02);
  border-color: var(--accent);
}

/* INVENTORY ITEM */
.inv-item {
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:10px;
}

.inv-item:hover {
  border-color: var(--accent);
}

/* CART */
.cart-item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid var(--border);
}

/* TOTAL */
.total-bar {
  background: linear-gradient(135deg, #1F2430, #181C23);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  display:flex;
  justify-content:space-between;
}

.total-bar .tv {
  font-size: 24px;
  font-weight:900;
  color: var(--accent);
}

/* BADGES */
.badge-ok { color: var(--green); }
.badge-low { color: var(--warn); }
.badge-out { color: var(--red); }

/* NAV */
.bottom-nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background: var(--surface);
  border-top:1px solid var(--border);
}

.nav-btn {
  flex:1;
  padding:10px;
  color:var(--sub);
}

.nav-btn.active {
  color: var(--accent);
}

/* TOAST */
.toast {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background: var(--surface2);
  padding:10px 20px;
  border-radius:30px;
  opacity:0;
}

.toast.show {
  opacity:1;
}

/* MOBILE TAP EFFECT */
.btn:active,
.sale-card:active {
  transform: scale(0.95);
}</style>

</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌿</div>
    <div>
      <h1>متجر العطّار</h1>
      <p>إدارة المخزون والمبيعات</p>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat"><span class="n" id="hdr-p">0</span><span class="l">صنف</span></div>
    <div class="hdr-stat"><span class="n" id="hdr-s">0</span><span class="l">فاتورة</span></div>
    <div class="hdr-stat"><span class="n" id="hdr-r">0</span><span class="l">إجمالي ج</span></div>
  </div>
</header>

<div class="dtabs">
  <button class="dtab active" onclick="sw('inventory',this)">📦 المخزون</button>
  <button class="dtab" onclick="sw('sale',this)">🛒 البيع</button>
  <button class="dtab" onclick="sw('history',this)">📋 السجل</button>
</div>

<main>

  <!-- INVENTORY -->

  <div class="panel active" id="panel-inventory">
    <div class="sl">إضافة صنف جديد</div>
    <div class="card">
      <div class="form-col drow">
        <div class="field">
          <label>اسم الصنف</label>
          <input type="text" id="new-name" placeholder="مثال: كمون، شمر، حبة بركة" />
        </div>
        <div class="two-col">
          <div class="field">
            <label>الكمية (كجم)</label>
            <input type="number" id="new-qty" placeholder="10" min="0.25" step="0.25" />
          </div>
          <div class="field">
            <label>سعر الكيلو (ج)</label>
            <input type="number" id="new-price" placeholder="50" min="0" step="0.5" />
          </div>
        </div>
        <button class="btn btn-accent" onclick="addProduct()">➕ إضافة</button>
      </div>
    </div>
    <div class="sl">الأصناف المتاحة</div>
    <div class="sw"><input type="text" id="inv-search" placeholder="ابحث عن صنف..." oninput="renderInventory()" /></div>
    <div id="inv-list"></div>
  </div>

  <!-- SALE -->

  <div class="panel" id="panel-sale">
    <div class="sale-layout">
      <div>
        <div class="sl">اختر صنف</div>
        <div class="sw"><input type="text" id="sale-search" placeholder="بحث..." oninput="renderSaleGrid()" /></div>
        <div class="sale-grid" id="sale-grid"></div>
      </div>
      <div class="cart-sticky">
        <div class="sl" style="display:flex;justify-content:space-between;align-items:center">
          <span>الفاتورة</span>
          <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="clearCart()">مسح</button>
        </div>
        <div class="card" style="padding:16px">
          <div id="cart-body"><div class="cart-empty">🛒<br>السلة فارغة<br>اختر صنف من القائمة</div></div>
          <div class="total-bar" id="total-bar" style="display:none">
            <span class="tl">الإجمالي</span>
            <span class="tv" id="cart-grand">0 ج</span>
          </div>
          <button class="btn btn-green" id="complete-btn" onclick="completeSale()" disabled>✅ إتمام البيع</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORY -->

  <div class="panel" id="panel-history">
    <div class="sl" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <span>سجل المبيعات</span>
      <button class="btn btn-red" style="font-size:11px;padding:5px 10px" onclick="clearHistory()">🗑 مسح</button>
    </div>
    <div id="history-list"></div>
  </div>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="sw('inventory',this)"><span class="ni">📦</span>المخزون</button>
  <button class="nav-btn" onclick="sw('sale',this)"><span class="ni">🛒</span>بيع</button>
  <button class="nav-btn" onclick="sw('history',this)"><span class="ni">📋</span>السجل</button>
</nav>

<!-- UNIT SHEET -->

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sh-handle"></div>
    <h3 id="sh-title">اختر الكمية</h3>
    <p class="sheet-sub" id="sh-sub"></p>
    <div class="unit-grid" id="unit-grid"></div>
    <button class="btn btn-accent" onclick="addToCart()">➕ إضافة للفاتورة</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let products = [], cart = [], salesHistory = [];
let cPid = null, selUnit = null;

function save() {
  localStorage.setItem('attar_p', JSON.stringify(products));
  localStorage.setItem('attar_h', JSON.stringify(salesHistory));
}
function load() {
  try { products     = JSON.parse(localStorage.getItem('attar_p')) || []; } catch(e){ products=[]; }
  try { salesHistory = JSON.parse(localStorage.getItem('attar_h')) || []; } catch(e){ salesHistory=[]; }
}

function sw(tab, btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn,.dtab').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.querySelectorAll('.nav-btn,.dtab').forEach(b=>{ if(b.getAttribute('onclick')?.includes("'"+tab+"'")) b.classList.add('active'); });
  if(tab==='sale') renderSaleGrid();
  if(tab==='history') renderHistory();
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

const HERBS=['🌿','🌱','🍃','🫚','🧄','🌾','🫘','🍂','🌰','🫛'];
function herb(n){ let h=0; for(let c of n) h=(h*31+c.charCodeAt(0))&0xFFFF; return HERBS[h%HERBS.length]; }

function addProduct() {
  const name=document.getElementById('new-name').value.trim();
  const qty=parseFloat(document.getElementById('new-qty').value);
  const price=parseFloat(document.getElementById('new-price').value);
  if(!name) return toast('⚠️ أدخل اسم الصنف');
  if(!qty||qty<=0) return toast('⚠️ أدخل الكمية');
  if(!price||price<=0) return toast('⚠️ أدخل السعر');
  products.push({id:Date.now(),name,qty:Math.round(qty*4)/4,price});
  save(); renderInventory(); updateHeader();
  document.getElementById('new-name').value='';
  document.getElementById('new-qty').value='';
  document.getElementById('new-price').value='';
  toast('✅ تم إضافة '+name);
}

function delProd(id) {
  if(!confirm('حذف هذا الصنف؟')) return;
  products=products.filter(p=>p.id!==id);
  save(); renderInventory(); updateHeader(); toast('🗑 تم الحذف');
}

function badgeHtml(qty) {
  if(qty<=0) return `<span class="badge badge-out">نفد</span>`;
  if(qty<1)  return `<span class="badge badge-low">منخفض</span>`;
  return             `<span class="badge badge-ok">متوفر</span>`;
}

function renderInventory() {
  const q=document.getElementById('inv-search').value.toLowerCase();
  const el=document.getElementById('inv-list');
  const f=products.filter(p=>p.name.includes(q)||p.name.toLowerCase().includes(q));
  if(!f.length){ el.innerHTML=`<div class="empty-state"><div class="ei">📦</div><p>${q?'لا نتائج':'لا توجد أصناف بعد'}</p></div>`; return; }
  el.innerHTML=f.map(p=>`
    <div class="inv-item">
      <div class="inv-emoji">${herb(p.name)}</div>
      <div class="inv-info">
        <div class="inv-name">${p.name}</div>
        <div class="inv-meta">
          <span class="chip">📦 ${p.qty} كجم</span>
          <span class="chip a">🏷️ ${p.price} ج/كجم</span>
          <span class="chip g">¼ = ${(p.price/4).toFixed(1)} ج</span>
          <span class="chip g">½ = ${(p.price/2).toFixed(1)} ج</span>
        </div>
      </div>
      <div class="inv-right">
        ${badgeHtml(p.qty)}
        <button class="btn btn-red" onclick="delProd(${p.id})" style="font-size:11px;padding:5px 10px">🗑</button>
      </div>
    </div>`).join('');
}

function renderSaleGrid() {
  const q=document.getElementById('sale-search').value.toLowerCase();
  const g=document.getElementById('sale-grid');
  const f=products.filter(p=>p.name.includes(q)||p.name.toLowerCase().includes(q));
  if(!f.length){ g.innerHTML=`<div style="grid-column:span 2;text-align:center;padding:30px;color:var(--sub)">لا توجد أصناف</div>`; return; }
  g.innerHTML=f.map(p=>{
    const out=p.qty<=0;
    return `<div class="sale-card ${out?'out':''}" onclick="${out?'':` openSheet(${p.id})`}">
      <div class="sc-icon">${herb(p.name)}</div>
      <div class="sc-name">${p.name}</div>
      <div class="sc-stock">${p.qty} كجم</div>
      <div class="sc-price">${p.price} ج/كجم</div>
    </div>`;
  }).join('');
}

function openSheet(id) {
  const p=products.find(x=>x.id===id); if(!p) return;
  cPid=id; selUnit=null;
  document.getElementById('sh-title').textContent=p.name;
  document.getElementById('sh-sub').textContent=`المتاح: ${p.qty} كجم · سعر الكيلو: ${p.price} ج`;
  const units=[{l:'¼ كجم',k:.25},{l:'½ كجم',k:.5},{l:'¾ كجم',k:.75},{l:'1 كجم',k:1}];
  document.getElementById('unit-grid').innerHTML=units.map((u,i)=>{
    const av=p.qty>=u.k;
    return `<div>
      <input type="radio" class="unit-radio" name="usel" id="u${i}" value="${u.k}" ${!av?'disabled':''} onchange="selUnit=${u.k}">
      <label for="u${i}" class="unit-tile ${!av?'dis':''}">
        <span class="utk">${u.l}</span>
        <span class="utp">${(p.price*u.k).toFixed(2)} ج</span>
        ${!av?'<span style="font-size:10px;color:var(--red);display:block;margin-top:3px">غير متاح</span>':''}
      </label>
    </div>`;
  }).join('');
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closeSheet(); });
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); cPid=null; selUnit=null; }

function addToCart() {
  if(!selUnit) return toast('⚠️ اختر الكمية أولاً');
  const p=products.find(x=>x.id===cPid); if(!p) return;
  const ex=cart.find(c=>c.id===p.id&&c.unit===selUnit);
  if(ex){ if(ex.qty*selUnit+selUnit>p.qty) return toast('⚠️ مخزون غير كافٍ'); ex.qty++; }
  else   cart.push({id:p.id,name:p.name,unit:selUnit,qty:1,ppk:p.price});
  renderCart(); closeSheet();
  const kl=selUnit===.25?'¼':selUnit===.5?'½':selUnit===.75?'¾':'1';
  toast(`✅ ${p.name} (${kl} كجم)`);
}

function renderCart() {
  const body=document.getElementById('cart-body');
  const bar=document.getElementById('total-bar');
  const btn=document.getElementById('complete-btn');
  if(!cart.length){ body.innerHTML=`<div class="cart-empty">🛒<br>السلة فارغة<br>اختر صنف من القائمة</div>`; bar.style.display='none'; btn.disabled=true; return; }
  let grand=0;
  body.innerHTML=cart.map((item,i)=>{
    const lt=item.qty*item.unit*item.ppk; grand+=lt;
    const kl=item.unit===.25?'¼':item.unit===.5?'½':item.unit===.75?'¾':'1';
    return `<div class="cart-item">
      <div class="cart-name">${item.name}<br><span class="cart-sub">${kl} كجم × ${item.qty}</span></div>
      <div class="qc">
        <button onclick="chQty(${i},-1)">−</button>
        <span>${item.qty}</span>
        <button onclick="chQty(${i},1)">+</button>
      </div>
      <div class="cart-price">${lt.toFixed(1)}ج</div>
      <button class="rm-btn" onclick="rmCart(${i})">✕</button>
    </div>`;
  }).join('');
  document.getElementById('cart-grand').textContent=grand.toFixed(2)+' ج';
  bar.style.display='flex'; btn.disabled=false;
}

function chQty(i,d) {
  const item=cart[i]; const p=products.find(x=>x.id===item.id); if(!p) return;
  const nq=item.qty+d;
  if(nq<=0) cart.splice(i,1);
  else if(nq*item.unit>p.qty){ toast('⚠️ مخزون غير كافٍ'); return; }
  else item.qty=nq;
  renderCart();
}
function rmCart(i){ cart.splice(i,1); renderCart(); }
function clearCart(){ if(!cart.length||!confirm('مسح الفاتورة؟')) return; cart=[]; renderCart(); }

function completeSale() {
  if(!cart.length) return;
  for(const item of cart){ const p=products.find(x=>x.id===item.id); if(!p||p.qty<item.qty*item.unit) return toast(`⚠️ مخزون "${item.name}" غير كافٍ`); }
  let total=0; const si=[];
  for(const item of cart){
    const p=products.find(x=>x.id===item.id);
    p.qty=Math.round((p.qty-item.qty*item.unit)*4)/4;
    const lt=item.qty*item.unit*item.ppk; total+=lt;
    const kl=item.unit===.25?'¼':item.unit===.5?'½':item.unit===.75?'¾':'1';
    si.push(`${item.name} (${item.qty}×${kl}) — ${lt.toFixed(2)} ج`);
  }
  salesHistory.unshift({id:Date.now(),date:new Date().toLocaleString('ar-EG'),items:si,total:total.toFixed(2)});
  save(); cart=[]; renderCart(); renderSaleGrid(); updateHeader();
  toast(`✅ تم البيع! الإجمالي: ${total.toFixed(2)} ج`);
}

function renderHistory() {
  const c=document.getElementById('history-list');
  if(!salesHistory.length){ c.innerHTML=`<div class="empty-state"><div class="ei">📋</div><p>لا توجد مبيعات بعد</p></div>`; return; }
  c.innerHTML=salesHistory.map(s=>`
    <div class="hist-card">
      <div class="hist-top">
        <div><div class="hist-date">🕐 ${s.date}</div><div class="hist-cnt">${s.items.length} صنف</div></div>
        <div class="hist-total">${s.total} ج</div>
      </div>
      <div class="hist-items">${s.items.join('<br>')}</div>
    </div>`).join('');
}

function clearHistory(){ if(!confirm('حذف كل السجل؟')) return; salesHistory=[]; save(); renderHistory(); updateHeader(); toast('🗑 تم مسح السجل'); }

function updateHeader() {
  document.getElementById('hdr-p').textContent=products.length;
  document.getElementById('hdr-s').textContent=salesHistory.length;
  document.getElementById('hdr-r').textContent=salesHistory.reduce((s,h)=>s+parseFloat(h.total),0).toFixed(0);
}

load(); renderInventory(); updateHeader();
</script>

</body>
</html>
