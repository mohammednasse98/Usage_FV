<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر العطار</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5EDD6;
    --sand-dark: #E8D9B5;
    --brown: #6B4226;
    --brown-light: #8B5E3C;
    --brown-dark: #3D1F0A;
    --green: #4A7C59;
    --green-light: #6BA07A;
    --gold: #C8973A;
    --gold-light: #E4B85A;
    --red: #C0392B;
    --cream: #FDF6E3;
    --shadow: rgba(61,31,10,0.18);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘Cairo’, sans-serif;
background: var(–sand);
color: var(–brown-dark);
min-height: 100vh;
background-image:
radial-gradient(ellipse at 10% 0%, rgba(200,151,58,0.12) 0%, transparent 50%),
radial-gradient(ellipse at 90% 100%, rgba(107,66,38,0.10) 0%, transparent 50%),
url(“data:image/svg+xml,%3Csvg width=‘60’ height=‘60’ viewBox=‘0 0 60 60’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=‘none’ fill-rule=‘evenodd’%3E%3Cg fill=’%236B4226’ fill-opacity=‘0.04’%3E%3Cpath d=‘M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z’/%3E%3C/g%3E%3C/g%3E%3C/svg%3E”);
}

/* HEADER */
header {
background: linear-gradient(135deg, var(–brown-dark) 0%, var(–brown) 60%, var(–brown-light) 100%);
padding: 18px 32px;
display: flex;
align-items: center;
justify-content: space-between;
box-shadow: 0 4px 20px var(–shadow);
position: sticky;
top: 0;
z-index: 100;
}

.logo {
display: flex;
align-items: center;
gap: 14px;
}

.logo-icon {
width: 48px; height: 48px;
background: var(–gold);
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 24px;
box-shadow: 0 2px 12px rgba(200,151,58,0.5);
}

.logo-text h1 {
font-family: ‘Amiri’, serif;
font-size: 26px;
color: var(–sand);
letter-spacing: 1px;
}

.logo-text p {
font-size: 11px;
color: var(–gold-light);
letter-spacing: 2px;
}

.header-stats {
display: flex;
gap: 20px;
}

.stat-pill {
background: rgba(255,255,255,0.1);
border: 1px solid rgba(200,151,58,0.3);
border-radius: 20px;
padding: 6px 16px;
text-align: center;
color: var(–sand);
}

.stat-pill .num {
font-size: 18px;
font-weight: 700;
color: var(–gold-light);
display: block;
line-height: 1;
}

.stat-pill .lbl {
font-size: 10px;
opacity: 0.8;
}

/* TABS */
.tabs {
display: flex;
gap: 0;
padding: 0 32px;
background: var(–brown-dark);
border-bottom: 3px solid var(–gold);
}

.tab-btn {
padding: 13px 28px;
border: none;
background: transparent;
color: rgba(245,237,214,0.6);
font-family: ‘Cairo’, sans-serif;
font-size: 15px;
font-weight: 600;
cursor: pointer;
position: relative;
transition: color 0.2s;
}

.tab-btn.active {
color: var(–gold-light);
}

.tab-btn.active::after {
content: ‘’;
position: absolute;
bottom: -3px;
left: 0; right: 0;
height: 3px;
background: var(–gold-light);
}

.tab-btn:hover:not(.active) { color: var(–sand); }

/* MAIN */
main {
max-width: 1300px;
margin: 0 auto;
padding: 28px 24px;
}

.panel { display: none; }
.panel.active { display: block; }

/* SECTION TITLE */
.section-title {
font-family: ‘Amiri’, serif;
font-size: 22px;
color: var(–brown);
margin-bottom: 20px;
display: flex;
align-items: center;
gap: 10px;
}

.section-title::after {
content: ‘’;
flex: 1;
height: 1px;
background: linear-gradient(to left, transparent, var(–gold));
}

/* ADD PRODUCT FORM */
.form-card {
background: var(–cream);
border-radius: 16px;
padding: 28px;
box-shadow: 0 4px 24px var(–shadow);
border: 1px solid rgba(200,151,58,0.2);
margin-bottom: 32px;
}

.form-grid {
display: grid;
grid-template-columns: 1fr 1fr 1fr auto;
gap: 16px;
align-items: end;
}

.form-group label {
display: block;
font-size: 13px;
font-weight: 600;
color: var(–brown);
margin-bottom: 6px;
}

.form-group input, .form-group select {
width: 100%;
padding: 10px 14px;
border: 2px solid var(–sand-dark);
border-radius: 10px;
font-family: ‘Cairo’, sans-serif;
font-size: 14px;
background: white;
color: var(–brown-dark);
transition: border-color 0.2s;
outline: none;
}

.form-group input:focus, .form-group select:focus {
border-color: var(–gold);
}

.btn-primary {
background: linear-gradient(135deg, var(–brown) 0%, var(–brown-light) 100%);
color: var(–sand);
border: none;
padding: 11px 24px;
border-radius: 10px;
font-family: ‘Cairo’, sans-serif;
font-size: 14px;
font-weight: 700;
cursor: pointer;
transition: transform 0.15s, box-shadow 0.15s;
white-space: nowrap;
box-shadow: 0 4px 12px rgba(107,66,38,0.35);
}

.btn-primary:hover {
transform: translateY(-2px);
box-shadow: 0 6px 18px rgba(107,66,38,0.45);
}

.btn-primary:active { transform: translateY(0); }

.btn-danger {
background: var(–red);
color: white;
border: none;
padding: 7px 14px;
border-radius: 8px;
font-family: ‘Cairo’, sans-serif;
font-size: 13px;
cursor: pointer;
transition: opacity 0.15s;
}

.btn-danger:hover { opacity: 0.85; }

.btn-gold {
background: linear-gradient(135deg, var(–gold) 0%, var(–gold-light) 100%);
color: var(–brown-dark);
border: none;
padding: 10px 20px;
border-radius: 10px;
font-family: ‘Cairo’, sans-serif;
font-size: 14px;
font-weight: 700;
cursor: pointer;
box-shadow: 0 3px 10px rgba(200,151,58,0.4);
transition: transform 0.15s;
}

.btn-gold:hover { transform: translateY(-1px); }

.btn-green {
background: linear-gradient(135deg, var(–green) 0%, var(–green-light) 100%);
color: white;
border: none;
padding: 10px 20px;
border-radius: 10px;
font-family: ‘Cairo’, sans-serif;
font-size: 14px;
font-weight: 700;
cursor: pointer;
box-shadow: 0 3px 10px rgba(74,124,89,0.4);
transition: transform 0.15s;
}

.btn-green:hover { transform: translateY(-1px); }

/* INVENTORY TABLE */
.table-wrap {
background: var(–cream);
border-radius: 16px;
overflow: hidden;
box-shadow: 0 4px 24px var(–shadow);
border: 1px solid rgba(200,151,58,0.15);
}

table {
width: 100%;
border-collapse: collapse;
}

thead tr {
background: linear-gradient(135deg, var(–brown-dark), var(–brown));
}

thead th {
padding: 14px 16px;
text-align: right;
color: var(–gold-light);
font-size: 13px;
font-weight: 700;
letter-spacing: 0.5px;
}

tbody tr {
border-bottom: 1px solid var(–sand-dark);
transition: background 0.15s;
}

tbody tr:hover { background: rgba(200,151,58,0.07); }
tbody tr:last-child { border-bottom: none; }

tbody td {
padding: 13px 16px;
font-size: 14px;
color: var(–brown-dark);
}

.stock-badge {
display: inline-block;
padding: 3px 10px;
border-radius: 20px;
font-size: 12px;
font-weight: 700;
}

.stock-ok { background: rgba(74,124,89,0.15); color: var(–green); }
.stock-low { background: rgba(192,57,43,0.12); color: var(–red); }
.stock-warn { background: rgba(200,151,58,0.18); color: #9B7A1A; }

/* SEARCH */
.search-row {
display: flex;
gap: 12px;
margin-bottom: 20px;
align-items: center;
}

.search-input {
flex: 1;
padding: 11px 16px;
border: 2px solid var(–sand-dark);
border-radius: 12px;
font-family: ‘Cairo’, sans-serif;
font-size: 14px;
background: var(–cream);
outline: none;
transition: border-color 0.2s;
}

.search-input:focus { border-color: var(–gold); }

/* SALE PANEL */
.sale-layout {
display: grid;
grid-template-columns: 1.2fr 1fr;
gap: 24px;
align-items: start;
}

.product-picker {
background: var(–cream);
border-radius: 16px;
padding: 24px;
box-shadow: 0 4px 24px var(–shadow);
border: 1px solid rgba(200,151,58,0.2);
}

.product-list-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 12px;
max-height: 420px;
overflow-y: auto;
padding-left: 4px;
}

.product-list-grid::-webkit-scrollbar { width: 5px; }
.product-list-grid::-webkit-scrollbar-thumb { background: var(–gold); border-radius: 3px; }

.product-card-pick {
background: white;
border: 2px solid var(–sand-dark);
border-radius: 12px;
padding: 14px;
cursor: pointer;
transition: border-color 0.2s, transform 0.15s, box-shadow 0.15s;
text-align: center;
}

.product-card-pick:hover {
border-color: var(–gold);
transform: translateY(-2px);
box-shadow: 0 6px 16px var(–shadow);
}

.product-card-pick.out {
opacity: 0.45;
cursor: not-allowed;
}

.product-card-pick .p-name {
font-size: 15px;
font-weight: 700;
color: var(–brown-dark);
margin-bottom: 4px;
}

.product-card-pick .p-stock {
font-size: 12px;
color: var(–brown-light);
}

.product-card-pick .p-price {
font-size: 13px;
font-weight: 600;
color: var(–green);
margin-top: 5px;
}

/* CART */
.cart-panel {
background: var(–cream);
border-radius: 16px;
padding: 24px;
box-shadow: 0 4px 24px var(–shadow);
border: 1px solid rgba(200,151,58,0.2);
position: sticky;
top: 90px;
}

.cart-title {
font-family: ‘Amiri’, serif;
font-size: 20px;
color: var(–brown);
margin-bottom: 16px;
display: flex;
align-items: center;
justify-content: space-between;
}

.cart-items {
max-height: 300px;
overflow-y: auto;
margin-bottom: 16px;
}

.cart-item {
display: flex;
align-items: center;
justify-content: space-between;
padding: 10px 0;
border-bottom: 1px solid var(–sand-dark);
gap: 8px;
}

.cart-item-name {
flex: 1;
font-size: 14px;
font-weight: 600;
color: var(–brown-dark);
}

.cart-item-qty {
display: flex;
align-items: center;
gap: 6px;
}

.qty-btn {
width: 26px; height: 26px;
border: 2px solid var(–gold);
background: white;
border-radius: 6px;
font-size: 16px;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-weight: 700;
color: var(–brown);
transition: background 0.15s;
}

.qty-btn:hover { background: var(–gold); color: white; }

.qty-val {
min-width: 52px;
text-align: center;
font-size: 13px;
font-weight: 700;
color: var(–brown-dark);
}

.cart-item-total {
font-size: 14px;
font-weight: 700;
color: var(–green);
min-width: 60px;
text-align: left;
}

.remove-btn {
background: none;
border: none;
cursor: pointer;
color: var(–red);
font-size: 16px;
line-height: 1;
padding: 2px;
}

.cart-empty {
text-align: center;
padding: 30px 0;
color: var(–brown-light);
font-size: 14px;
}

.cart-total-box {
background: linear-gradient(135deg, var(–brown-dark), var(–brown));
border-radius: 12px;
padding: 16px;
color: var(–sand);
margin-bottom: 14px;
}

.cart-total-box .total-line {
display: flex;
justify-content: space-between;
font-size: 14px;
margin-bottom: 4px;
}

.cart-total-box .grand-total {
display: flex;
justify-content: space-between;
font-size: 20px;
font-weight: 900;
color: var(–gold-light);
border-top: 1px solid rgba(255,255,255,0.2);
padding-top: 8px;
margin-top: 8px;
}

/* UNIT SELECT inside sale */
.unit-selector {
padding: 10px 0 16px;
}

.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(61,31,10,0.55);
z-index: 200;
align-items: center;
justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
background: var(–cream);
border-radius: 18px;
padding: 30px;
width: 380px;
box-shadow: 0 12px 48px rgba(0,0,0,0.3);
position: relative;
animation: popIn 0.25s ease;
}

@keyframes popIn {
from { transform: scale(0.88); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}

.modal h3 {
font-family: ‘Amiri’, serif;
font-size: 20px;
color: var(–brown);
margin-bottom: 18px;
}

.modal-close {
position: absolute;
top: 14px; left: 16px;
background: none;
border: none;
font-size: 22px;
cursor: pointer;
color: var(–brown-light);
}

.unit-radio-group {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 18px;
}

.unit-radio {
display: none;
}

.unit-label {
display: block;
padding: 12px;
border: 2px solid var(–sand-dark);
border-radius: 10px;
text-align: center;
cursor: pointer;
font-size: 14px;
font-weight: 600;
color: var(–brown);
transition: border-color 0.2s, background 0.2s;
}

.unit-label .unit-amount { font-size: 18px; color: var(–brown-dark); display: block; margin-bottom: 2px; }
.unit-label .unit-price { font-size: 12px; color: var(–green); }

.unit-radio:checked + .unit-label {
border-color: var(–gold);
background: rgba(200,151,58,0.12);
}

/* HISTORY */
.history-card {
background: var(–cream);
border-radius: 14px;
padding: 18px 22px;
margin-bottom: 12px;
box-shadow: 0 2px 12px var(–shadow);
border-right: 4px solid var(–gold);
display: flex;
justify-content: space-between;
align-items: center;
gap: 16px;
}

.history-meta { flex: 1; }
.history-date { font-size: 12px; color: var(–brown-light); margin-bottom: 4px; }
.history-items { font-size: 14px; color: var(–brown-dark); }
.history-total { font-size: 20px; font-weight: 900; color: var(–green); }

.history-detail {
font-size: 12px;
color: var(–brown-light);
margin-top: 6px;
line-height: 1.7;
}

.empty-state {
text-align: center;
padding: 60px 0;
color: var(–brown-light);
}

.empty-state .icon { font-size: 56px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; }

/* TOAST */
.toast {
position: fixed;
bottom: 28px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–brown-dark);
color: var(–sand);
padding: 12px 28px;
border-radius: 30px;
font-size: 14px;
font-weight: 600;
z-index: 999;
transition: transform 0.3s ease;
border: 2px solid var(–gold);
pointer-events: none;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* EDIT inline */
.edit-input {
width: 70px;
padding: 4px 8px;
border: 1px solid var(–gold);
border-radius: 6px;
font-family: ‘Cairo’, sans-serif;
font-size: 13px;
text-align: center;
}

/* RESPONSIVE */
@media (max-width: 900px) {
.form-grid { grid-template-columns: 1fr 1fr; }
.sale-layout { grid-template-columns: 1fr; }
.header-stats { display: none; }
.cart-panel { position: static; }
}

@media (max-width: 600px) {
header { padding: 14px 16px; }
main { padding: 16px 12px; }
.tabs { padding: 0 12px; overflow-x: auto; }
.tab-btn { padding: 11px 18px; font-size: 13px; }
.form-grid { grid-template-columns: 1fr; }
.product-list-grid { grid-template-columns: 1fr 1fr; }
}
</style>

</head>

<script>
// ===== DATA =====
let products = [];
let cart = [];
let salesHistory = [];
let currentProductId = null;
let selectedUnit = null;

// ===== LOCAL STORAGE =====
function save() {
  localStorage.setItem('attar_products', JSON.stringify(products));
  localStorage.setItem('attar_history', JSON.stringify(salesHistory));
}

function load() {
  const p = localStorage.getItem('attar_products');
  const h = localStorage.getItem('attar_history');
  if (p) products = JSON.parse(p);
  if (h) salesHistory = JSON.parse(h);
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'sale') renderSaleProducts();
  if (tab === 'history') renderHistory();
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== PRODUCTS =====
function addProduct() {
  const name = document.getElementById('new-name').value.trim();
  const qty = parseFloat(document.getElementById('new-qty').value);
  const price = parseFloat(document.getElementById('new-price').value);

  if (!name) return showToast('⚠️ أدخل اسم الصنف');
  if (!qty || qty <= 0) return showToast('⚠️ أدخل الكمية');
  if (!price || price <= 0) return showToast('⚠️ أدخل السعر');

  products.push({
    id: Date.now(),
    name,
    qty: Math.round(qty * 4) / 4, // round to quarter
    price
  });

  save();
  renderInventory();
  updateHeader();

  document.getElementById('new-name').value = '';
  document.getElementById('new-qty').value = '';
  document.getElementById('new-price').value = '';
  showToast('✅ تم إضافة ' + name);
}

function deleteProduct(id) {
  if (!confirm('هل تريد حذف هذا الصنف؟')) return;
  products = products.filter(p => p.id !== id);
  save();
  renderInventory();
  updateHeader();
  showToast('🗑 تم الحذف');
}

function startEdit(id, field, currentVal) {
  const cell = document.getElementById(`cell-${id}-${field}`);
  const old = cell.innerHTML;
  cell.innerHTML = `<input class="edit-input" type="number" value="${currentVal}" min="0" step="${field === 'qty' ? '0.25' : '0.5'}" onblur="saveEdit(${id},'${field}',this.value,'${old}')" onkeydown="if(event.key==='Enter')this.blur()" />`;
  cell.querySelector('input').focus();
}

function saveEdit(id, field, val, old) {
  const v = parseFloat(val);
  const p = products.find(x => x.id === id);
  if (!p || isNaN(v) || v < 0) { document.getElementById(`cell-${id}-${field}`).innerHTML = old; return; }
  if (field === 'qty') p.qty = Math.round(v * 4) / 4;
  if (field === 'price') p.price = Math.round(v * 100) / 100;
  save();
  renderInventory();
  showToast('✏️ تم التعديل');
}

function getStockStatus(qty) {
  if (qty <= 0) return { cls: 'stock-low', label: 'نفد' };
  if (qty < 1) return { cls: 'stock-warn', label: 'منخفض' };
  return { cls: 'stock-ok', label: 'متوفر' };
}

function renderInventory() {
  const q = document.getElementById('inv-search').value.toLowerCase();
  const tbody = document.getElementById('inv-body');
  const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.name.includes(q));

  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--brown-light)">لا توجد أصناف${q ? ' مطابقة' : ''}</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map((p, i) => {
    const st = getStockStatus(p.qty);
    const quarter = (p.price / 4).toFixed(2);
    const half = (p.price / 2).toFixed(2);
    return `<tr>
      <td style="color:var(--brown-light);font-size:12px">${i + 1}</td>
      <td style="font-weight:700">${p.name}</td>
      <td id="cell-${p.id}-qty" ondblclick="startEdit(${p.id},'qty',${p.qty})" style="cursor:pointer" title="اضغط مرتين للتعديل">${p.qty} كجم</td>
      <td id="cell-${p.id}-price" ondblclick="startEdit(${p.id},'price',${p.price})" style="cursor:pointer" title="اضغط مرتين للتعديل">${p.price} ج</td>
      <td style="color:var(--brown-light)">${quarter} ج</td>
      <td style="color:var(--brown-light)">${half} ج</td>
      <td><span class="stock-badge ${st.cls}">${st.label}</span></td>
      <td><button class="btn-danger" onclick="deleteProduct(${p.id})">🗑</button></td>
    </tr>`;
  }).join('');
}

// ===== SALE =====
function renderSaleProducts() {
  const q = document.getElementById('sale-search').value.toLowerCase();
  const container = document.getElementById('sale-products');
  const filtered = products.filter(p => p.name.toLowerCase().includes(q) || p.name.includes(q));

  if (filtered.length === 0) {
    container.innerHTML = `<div style="grid-column:span 2;text-align:center;padding:40px;color:var(--brown-light)">لا توجد أصناف</div>`;
    return;
  }

  container.innerHTML = filtered.map(p => {
    const out = p.qty <= 0;
    return `<div class="product-card-pick ${out ? 'out' : ''}" onclick="${out ? '' : `openModal(${p.id})`}">
      <div class="p-name">${p.name}</div>
      <div class="p-stock">المتاح: ${p.qty} كجم</div>
      <div class="p-price">${p.price} ج/كجم</div>
      ${out ? '<div style="color:var(--red);font-size:11px;margin-top:4px">نفد المخزون</div>' : ''}
    </div>`;
  }).join('');
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  currentProductId = id;
  selectedUnit = null;

  document.getElementById('modal-product-name').textContent = '📦 ' + p.name;

  const units = [
    { label: '¼ كجم', kg: 0.25 },
    { label: '½ كجم', kg: 0.5 },
    { label: '¾ كجم', kg: 0.75 },
    { label: '1 كجم',  kg: 1 },
  ];

  const opts = document.getElementById('unit-options');
  opts.innerHTML = units.map((u, i) => {
    const price = (p.price * u.kg).toFixed(2);
    const avail = p.qty >= u.kg;
    return `
      <div>
        <input type="radio" name="unit" id="u${i}" class="unit-radio" value="${u.kg}" ${!avail ? 'disabled' : ''} onchange="selectedUnit=${u.kg}" />
        <label for="u${i}" class="unit-label" style="${!avail ? 'opacity:.4;cursor:not-allowed' : ''}">
          <span class="unit-amount">${u.label}</span>
          <span class="unit-price">${price} ج</span>
          ${!avail ? '<span style="font-size:10px;color:var(--red)">غير متاح</span>' : ''}
        </label>
      </div>`;
  }).join('');

  document.getElementById('unit-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('unit-modal').classList.remove('open');
  currentProductId = null;
  selectedUnit = null;
}

function addToCart() {
  if (!selectedUnit) return showToast('⚠️ اختر الكمية أولاً');
  const p = products.find(x => x.id === currentProductId);
  if (!p) return;

  const existing = cart.find(c => c.id === p.id && c.unit === selectedUnit);
  if (existing) {
    if (existing.qty * selectedUnit >= p.qty) return showToast('⚠️ لا يوجد مخزون كافي');
    existing.qty++;
  } else {
    cart.push({ id: p.id, name: p.name, unit: selectedUnit, qty: 1, pricePerKg: p.price });
  }

  renderCart();
  closeModal();
  showToast(`✅ تم إضافة ${p.name} (${selectedUnit === 0.25 ? '¼' : selectedUnit === 0.5 ? '½' : selectedUnit === 0.75 ? '¾' : '1'} كجم)`);
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const totalBox = document.getElementById('cart-total-box');
  const completeBtn = document.getElementById('complete-btn');

  if (cart.length === 0) {
    container.innerHTML = `<div class="cart-empty">السلة فارغة 🌿<br>اختر أصناف من اليسار</div>`;
    totalBox.style.display = 'none';
    completeBtn.disabled = true;
    return;
  }

  let grandTotal = 0;

  container.innerHTML = cart.map((item, i) => {
    const lineTotal = item.qty * item.unit * item.pricePerKg;
    grandTotal += lineTotal;
    const kgLabel = item.unit === 0.25 ? '¼' : item.unit === 0.5 ? '½' : item.unit === 0.75 ? '¾' : '1';
    return `<div class="cart-item">
      <div class="cart-item-name">${item.name}<br><span style="font-size:11px;color:var(--brown-light)">${kgLabel} كجم × ${item.qty}</span></div>
      <div class="cart-item-qty">
        <button class="qty-btn" onclick="changeCartQty(${i},-1)">−</button>
        <span class="qty-val">${item.qty}×${kgLabel}</span>
        <button class="qty-btn" onclick="changeCartQty(${i},1)">+</button>
      </div>
      <div class="cart-item-total">${lineTotal.toFixed(2)} ج</div>
      <button class="remove-btn" onclick="removeFromCart(${i})">✕</button>
    </div>`;
  }).join('');

  document.getElementById('cart-count').textContent = cart.reduce((s, c) => s + c.qty, 0);
  document.getElementById('cart-grand').textContent = grandTotal.toFixed(2) + ' ج';
  totalBox.style.display = 'block';
  completeBtn.disabled = false;
}

function changeCartQty(idx, delta) {
  const item = cart[idx];
  const p = products.find(x => x.id === item.id);
  if (!p) return;
  const newQty = item.qty + delta;
  if (newQty <= 0) { cart.splice(idx, 1); }
  else if (newQty * item.unit > p.qty) { showToast('⚠️ لا يوجد مخزون كافي'); return; }
  else { item.qty = newQty; }
  renderCart();
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  renderCart();
}

function clearCart() {
  if (cart.length === 0) return;
  if (!confirm('هل تريد مسح الفاتورة؟')) return;
  cart = [];
  renderCart();
}

function completeSale() {
  if (cart.length === 0) return;

  // Check stock
  for (const item of cart) {
    const p = products.find(x => x.id === item.id);
    if (!p || p.qty < item.qty * item.unit) {
      return showToast(`⚠️ مخزون "${item.name}" غير كافٍ`);
    }
  }

  // Deduct stock
  let total = 0;
  const saleItems = [];
  for (const item of cart) {
    const p = products.find(x => x.id === item.id);
    const kgSold = item.qty * item.unit;
    p.qty = Math.round((p.qty - kgSold) * 4) / 4;
    const lineTotal = item.qty * item.unit * item.pricePerKg;
    total += lineTotal;
    const kgLabel = item.unit === 0.25 ? '¼' : item.unit === 0.5 ? '½' : item.unit === 0.75 ? '¾' : '1';
    saleItems.push(`${item.name} (${item.qty}×${kgLabel} كجم) - ${lineTotal.toFixed(2)} ج`);
  }

  salesHistory.unshift({
    id: Date.now(),
    date: new Date().toLocaleString('ar-EG'),
    items: saleItems,
    total: total.toFixed(2)
  });

  save();
  cart = [];
  renderCart();
  renderSaleProducts();
  updateHeader();

  showToast(`✅ تم البيع! الإجمالي: ${total.toFixed(2)} ج`);
}

// ===== HISTORY =====
function renderHistory() {
  const container = document.getElementById('history-list');
  if (salesHistory.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>لا توجد مبيعات بعد</p></div>`;
    return;
  }
  container.innerHTML = salesHistory.map(s => `
    <div class="history-card">
      <div class="history-meta">
        <div class="history-date">🕐 ${s.date}</div>
        <div class="history-items">${s.items.length} صنف</div>
        <div class="history-detail">${s.items.join('<br>')}</div>
      </div>
      <div class="history-total">${s.total} ج</div>
    </div>
  `).join('');
}

function clearHistory() {
  if (!confirm('هل تريد حذف كل سجل المبيعات؟')) return;
  salesHistory = [];
  save();
  renderHistory();
  updateHeader();
  showToast('🗑 تم مسح السجل');
}

// ===== HEADER =====
function updateHeader() {
  document.getElementById('hdr-products').textContent = products.length;
  document.getElementById('hdr-sales').textContent = salesHistory.length;
  const rev = salesHistory.reduce((s, h) => s + parseFloat(h.total), 0);
  document.getElementById('hdr-revenue').textContent = rev.toFixed(0);
}

// ===== INIT =====
load();
renderInventory();
updateHeader();

// Close modal on overlay click
document.getElementById('unit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>

</body>
